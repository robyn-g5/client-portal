<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60">
  <!-- Hexagon badge -->
  <path d="M30 2 L52 14 L52 38 L30 50 L8 38 L8 14 Z" fill="#3d4f5f"/>
  
  <!-- Stylized curved pine tree - matching iMuskoka organic flowing design -->
  <g fill="none" stroke="#7cb342" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main curved trunk flowing from bottom-left upward -->
    <path d="M18 42 Q22 32, 26 24 Q30 16, 34 10 Q36 7, 38 8"/>
    <!-- Lower branch curving left -->
    <path d="M22 34 Q18 30, 14 28"/>
    <!-- Middle branch curving left -->
    <path d="M26 26 Q22 22, 17 20"/>
    <!-- Upper branch curving left -->
    <path d="M30 18 Q26 15, 22 14"/>
  </g>
  
  <!-- iMuskoka text -->
  <text x="70" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ffffff">iMuskoka</text>
  <!-- PROPERTIES text -->
  <text x="70" y="48" font-family="Arial, sans-serif" font-size="11" letter-spacing="3" fill="#ffffff">PROPERTIES</text>
</svg>
