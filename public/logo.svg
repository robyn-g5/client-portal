<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <!-- Hexagon badge -->
  <path d="M30 0L55.98 15v30L30 60 4.02 45V15L30 0z" fill="#454F5B"/>
  <!-- Stylized pine tree with curved trunk and 3 branches -->
  <g fill="#7CB342" stroke="#7CB342" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main curved trunk -->
    <path d="M30 50 C28 42, 24 35, 22 28 C20 22, 22 16, 28 12" fill="none" stroke-width="4"/>
    <!-- Top branch with leaf tip -->
    <path d="M28 12 C32 10, 36 8, 38 6" fill="none" stroke-width="3"/>
    <circle cx="38" cy="6" r="2" fill="#7CB342"/>
    <!-- Middle branch -->
    <path d="M24 24 C18 22, 14 20, 12 18" fill="none" stroke-width="3"/>
    <!-- Bottom branch -->
    <path d="M26 34 C20 34, 16 33, 13 32" fill="none" stroke-width="3"/>
  </g>
  <!-- iMuskoka text - dark for light backgrounds -->
  <text x="70" y="32" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#454F5B">iMuskoka</text>
  <!-- PROPERTIES text - slightly lighter gray -->
  <text x="72" y="50" font-family="Arial, sans-serif" font-size="11" letter-spacing="3" fill="#6B7280">PROPERTIES</text>
</svg>
